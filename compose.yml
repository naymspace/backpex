services:
  app:
    build:
      context: .
      target: builder
      args:
        MIX_ENV: dev
    env_file: demo/.env
    environment:
      - STARTUP_COMMAND_1=mix do deps.get + ecto.create + ecto.migrate
      - STARTUP_COMMAND_1=mix do deps.get + ecto.create + ecto.migrate
      - STARTUP_COMMAND_2=bun install --frozen-lockfile
      - STARTUP_COMMAND_3=bunx playwright install chromium --with-deps
      - STARTUP_COMMAND_4=mix assets.setup
      - STARTUP_COMMAND_5=cd .. && mix deps.get && bun install --frozen-lockfile && cd demo
    volumes:
      - .:/opt/app
    ports:
      - 4000:4000
      - 4007:4007
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16.13@sha256:760ea41aae126965bedd587d35a23de37447bb13a6ac4444bef6ff73b8b72234
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - 54321:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
